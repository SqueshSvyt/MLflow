# ML-пайплайн у CI:
# - Lint → unit-тести → DVC pull + dvc repro (prepare, train) → integration (Quality Gate + MLflow)
#
# Remote MinIO: Settings → Secrets → Actions:
#   MINIO_ACCESS_KEY_ID, MINIO_SECRET_ACCESS_KEY
# (без них job завершиться помилкою — сирі дані лише з DVC remote)
#
# Великий data/raw на remote: перший pull може зайняти десятки хвилин; timeout job збільшено.
name: ML Train CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ml-train-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  train-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      MLFLOW_TRACKING_URI: ${{ github.workspace }}/mlruns
      QUALITY_F1_MIN: "0.01"
      PYTHONPATH: ${{ github.workspace }}
      AWS_ACCESS_KEY_ID: ${{ secrets.MINIO_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.MINIO_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Lint (black)
        run: black --check tests airflow/dags scripts

      - name: Lint (flake8)
        run: flake8 tests airflow/dags scripts

      - name: Unit / smoke tests (без integration)
        run: pytest tests/ -m "not integration" --tb=short

      - name: Пайплайн — DVC pull + dvc repro (prepare, train)
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "::error::Потрібні MINIO_ACCESS_KEY_ID та MINIO_SECRET_ACCESS_KEY у Secrets для dvc pull"
            exit 1
          fi
          dvc pull data/raw.dvc
          dvc repro prepare train

      - name: Integration — Quality Gate + MLflow artifacts
        run: pytest tests/ -m integration --tb=short

# Відповідає src.models.gradient_boosting: GradientBoostingClassifier(max_depth, n_estimators, learning_rate)
name: GradientBoosting

# Гіперпараметри для train (build_model у gradient_boosting/train.py)
max_depth: 5
n_estimators: 100
learning_rate: 0.1

# Для HPO в optimize.py
min_samples_split: 2
min_samples_leaf: 1

search_space:
  max_depth: [2, 15]
  n_estimators: [50, 250]
  learning_rate: [0.01, 0.3]
  min_samples_split: [2, 20]
  min_samples_leaf: [1, 10]

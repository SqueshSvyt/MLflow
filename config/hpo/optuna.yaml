# HPO стратегія: Optuna (TPE sampler)
strategy: optuna

n_trials: 20
study_name: ham10000_hpo_optuna
metric: val_f1_weighted
direction: maximize

# Оцінка: holdout (train/val split) або cv (cross-validation)
evaluation: holdout
val_ratio: 0.2
val_random_state: 42
n_folds: 5

# Optuna-специфічне
sampler: TPE
n_startup_trials: 5
